name: flashcat_webview_tracking
description: A package for tracking FlashCat sessions in a webview
version: 0.1.0
homepage: https://flashcat.cloud
repository: https://github.com/flashcatcloud/fc-sdk-flutter

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flashcat_flutter_plugin: ^0.1.0
  webview_flutter: ^4.0.4
  webview_flutter_android: ^3.8.2
  webview_flutter_wkwebview: ^3.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.0.2
  
flutter:
  plugin:
    platforms:
      android:
        package: com.datadoghq.flutter.webview
        pluginClass: DatadogFlutterWebViewPlugin
      ios:
        pluginClass: DatadogWebViewTrackingPlugin
