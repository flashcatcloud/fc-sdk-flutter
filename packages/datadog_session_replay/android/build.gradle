group = "com.datadoghq.datadog_session_replay"
version = "1.0-SNAPSHOT"

buildscript {
    ext.kotlin_version = "1.8.22"
    ext.datadog_version = "2.20.0"

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.7.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"

android {
    defaultConfig {
        consumerProguardFiles 'consumer-rules.pro'
    }
    
    namespace = "com.datadoghq.datadog_session_replay"

    compileSdk = 35

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
        test.java.srcDirs += "src/test/kotlin"
    }

    defaultConfig {
        minSdk = 21
    }

    dependencies {
        implementation("com.datadoghq:dd-sdk-android-core:$datadog_version")
        implementation("com.squareup.okhttp3:okhttp:4.12.0")
        implementation("com.google.code.gson:gson:2.12.1")

        testImplementation("com.willowtreeapps.assertk:assertk:0.28.1")
        testImplementation("org.jetbrains.kotlin:kotlin-test")
        testImplementation("org.junit.jupiter:junit-jupiter")
        testImplementation("com.github.xgouchet.Elmyr:core:1.3.1")
        testImplementation("com.github.xgouchet.Elmyr:junit5:1.3.1")
        testImplementation("com.github.xgouchet.Elmyr:jvm:1.3.1")
        testImplementation("io.mockk:mockk:1.14.2")
    }

    testOptions {
        unitTests.all {
            useJUnitPlatform()

            testLogging {
               events "passed", "skipped", "failed", "standardOut", "standardError"
               outputs.upToDateWhen {false}
               showStandardStreams = true
            }
        }
    }
}
