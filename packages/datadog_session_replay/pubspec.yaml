name: datadog_session_replay
description: "Support for Flutter Session Replay in Datadog"
version: 0.1.0
homepage: https://datadoghq.com
repository: https://github.com/DataDog/dd-sdk-flutter

environment:
  sdk: ^3.7.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  ffi: ^2.1.4
  jni: ^0.14.2
  objective_c: ^8.1.0
  web: ^1.0.0
  meta: ^1.16.0  
  plugin_platform_interface: ^2.0.2
  datadog_flutter_plugin: ^3.0.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  json_serializable: '>=6.7.0 <6.10.0'
  build_runner: ^2.4.15
  ffigen: ^19.1.0
  jnigen: ^0.14.2
  datadog_common_test:
    path: ../datadog_common_test

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      web:
        pluginClass: DatadogSessionReplayWeb
        fileName: src/datadog_session_replay_web.dart
