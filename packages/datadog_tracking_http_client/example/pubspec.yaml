name: flashcat_tracking_http_client_example
description: Demonstrates how to use the flashcat_tracking_http_client package.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.15.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_dotenv: ^5.0.2
  http: ">=0.13.4 <2.0.0"
  transparent_image: ^2.0.0

  flashcat_flutter_plugin:
    path: ../../datadog_flutter_plugin
  flashcat_tracking_http_client:
    path: ../
  datadog_common_test:
    path: ../../datadog_common_test
  dio: ^5.7.0  

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  collection: ^1.18.0
  
flutter:
  uses-material-design: true

  assets:
    - .env

dependency_overrides:
  flashcat_flutter_plugin:
    path: ../../datadog_flutter_plugin
    